<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0c0c0c" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebd097" />
      <stop offset="50%" stop-color="#c9a96e" />
      <stop offset="100%" stop-color="#9a7b43" />
    </linearGradient>

    <!-- Steel Gear Gradient -->
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="50%" stop-color="#4a4a4a" />
      <stop offset="100%" stop-color="#1c1c1c" />
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    /* CSS Animations for SVG elements */
    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-counter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; filter: drop-shadow(0 0 2px #c9a96e); }
      50% { opacity: 0.35; filter: drop-shadow(0 0 15px #c9a96e); }
    }

    @keyframes shine {
      0% { stop-color: #ebd097; }
      50% { stop-color: #ffffff; }
      100% { stop-color: #ebd097; }
    }

    @keyframes float-sub {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* Target classes */
    .gear-main {
      transform-origin: 120px 125px;
      animation: spin-clockwise 25s linear infinite;
    }

    .gear-small {
      transform-origin: 195px 80px;
      animation: spin-counter 12s linear infinite;
    }

    .gear-tiny {
      transform-origin: 235px 125px;
      animation: spin-clockwise 8s linear infinite;
    }

    .logo-glow {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .title-text {
      font-family: 'Cinzel', 'Playfair Display', 'Didot', 'Georgia', serif;
      font-weight: 300;
      letter-spacing: 12px;
      fill: url(#goldGrad);
    }

    .subtitle-text {
      font-family: 'Montserrat', 'Inter', 'Helvetica Neue', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 7px;
      fill: #a2a2a2;
      animation: float-sub 5s ease-in-out infinite;
    }

    .shimmer {
      animation: shine 3s infinite;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3" rx="8" ry="8" />

  <!-- Animated Watch Movement Group (Left) -->
  <g opacity="0.4">
    <!-- Outer concentric ring -->
    <circle cx="120" cy="125" r="95" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" stroke-dasharray="4 8" />
    <circle cx="120" cy="125" r="85" fill="none" stroke="#222" stroke-width="2" />

    <!-- Main Gear (Center 120, 125) -->
    <g class="gear-main">
      <circle cx="120" cy="125" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="3" />
      <!-- Teeth -->
      <path d="M 120 55 L 120 65 M 120 185 L 120 195 M 50 125 L 60 125 M 180 125 L 190 125
               M 70 75 L 77 82 M 163 168 L 170 175 M 70 175 L 77 168 M 163 82 L 170 75
               M 90 60 L 93 69 M 150 181 L 147 190 M 60 90 L 69 93 M 180 150 L 190 147
               M 60 160 L 69 157 M 180 90 L 190 93 M 90 190 L 93 181 M 150 60 L 147 69" 
            stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
      <!-- Spokes -->
      <line x1="120" y1="65" x2="120" y2="185" stroke="url(#goldGrad)" stroke-width="1.5" />
      <line x1="60" y1="125" x2="180" y2="125" stroke="url(#goldGrad)" stroke-width="1.5" />
      <circle cx="120" cy="125" r="12" fill="#121212" stroke="url(#goldGrad)" stroke-width="2" />
    </g>

    <!-- Small Meshing Gear (Center 195, 80) -->
    <g class="gear-small">
      <circle cx="195" cy="80" r="35" fill="none" stroke="url(#steelGrad)" stroke-width="2" />
      <!-- Teeth -->
      <path d="M 195 40 L 195 45 M 195 115 L 195 120 M 155 80 L 160 80 M 230 80 L 235 80
               M 167 52 L 171 56 M 219 104 L 223 108 M 167 108 L 171 104 M 219 56 L 223 52" 
            stroke="url(#steelGrad)" stroke-width="2" />
      <!-- Spokes -->
      <circle cx="195" cy="80" r="16" fill="none" stroke="url(#steelGrad)" stroke-width="1" />
      <line x1="195" y1="45" x2="195" y2="115" stroke="url(#steelGrad)" stroke-width="1" />
      <line x1="160" y1="80" x2="230" y2="80" stroke="url(#steelGrad)" stroke-width="1" />
      <circle cx="195" cy="80" r="6" fill="#121212" stroke="url(#steelGrad)" stroke-width="1.5" />
    </g>

    <!-- Tiny Gold Accent Gear (Center 235, 125) -->
    <g class="gear-tiny">
      <circle cx="235" cy="125" r="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
      <!-- Teeth -->
      <path d="M 235 100 L 235 103 M 235 147 L 235 150 M 210 125 L 213 125 M 257 125 L 260 125
               M 217 107 L 220 110 M 250 140 L 253 143 M 217 143 L 220 140 M 250 110 L 253 107"
            stroke="url(#goldGrad)" stroke-width="1.5" />
      <circle cx="235" cy="125" r="4" fill="#121212" stroke="url(#goldGrad)" stroke-width="1" />
    </g>
  </g>

  <!-- Glowing Radial Light behind title -->
  <circle cx="480" cy="120" r="150" fill="url(#glowGrad)" class="logo-glow" />

  <!-- KRONOS Logo Typography (Right Center) -->
  <g transform="translate(480, 130)">
    <!-- Gold Shadow Title -->
    <text x="0" y="0" text-anchor="middle" font-size="52" class="title-text logo-glow" opacity="0.3" transform="scale(1.02)">KRONOS</text>
    <!-- Sharp Front Title -->
    <text x="0" y="0" text-anchor="middle" font-size="52" class="title-text">KRONOS</text>
    
    <!-- Decorative Line -->
    <path d="M -90 18 L 90 18" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.6" />
    <circle cx="0" cy="18" r="3" fill="#c9a96e" />
    <circle cx="-50" cy="18" r="1.5" fill="#c9a96e" opacity="0.7" />
    <circle cx="50" cy="18" r="1.5" fill="#c9a96e" opacity="0.7" />

    <!-- Subtitle -->
    <text x="0" y="38" text-anchor="middle" class="subtitle-text">THE ART OF HOROLOGY</text>
  </g>

  <!-- Decorative technical lines -->
  <path d="M 30 30 L 150 30 M 30 30 L 30 100" stroke="#c9a96e" stroke-width="0.5" opacity="0.25" />
  <path d="M 770 220 L 650 220 M 770 220 L 770 150" stroke="#c9a96e" stroke-width="0.5" opacity="0.25" />
</svg>
